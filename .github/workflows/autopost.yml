name: Autonomous Trend Post

on:
  schedule:
    # 매시간 정각 (UTC 기준). 한국시간으로도 매시간 정각.
    - cron: '0 * * * *'
  workflow_dispatch:

# 동시 실행 방지: 이전 실행이 끝나기 전엔 새로 안 띄움
concurrency:
  group: autopost
  cancel-in-progress: false

permissions:
  contents: write     # naver_drafts/ 폴더에 파일 커밋·푸시

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_APP_PW: ${{ secrets.WP_APP_PW }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # 검토 큐 모드 (값을 1로 두면 draft로 저장, 빈 값/제거하면 자동 발행)
          PUBLISH_AS_DRAFT: ${{ vars.PUBLISH_AS_DRAFT }}
        run: python autonomous_issue_bot.py
      - name: Commit Naver drafts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add naver_drafts/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new Naver drafts to commit."
          else
            git commit -m "naver drafts $(date -u +%Y-%m-%d-%H)"
            # 동시 push 충돌 방지 — 최대 3회 retry
            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push; then
                echo "Push success on attempt $i"
                break
              fi
              echo "Push attempt $i failed, retry in 5s"
              sleep 5
            done
          fi
