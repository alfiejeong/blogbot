name: Autonomous Trend Post
on:
  schedule:
    # 매시간 정각 (UTC 기준). 한국시간으로도 매시간 정각.
    - cron: '0 * * * *'
  workflow_dispatch:
# 동시 실행 방지: 이전 실행이 끝나기 전엔 새로 안 띄움
concurrency:
  group: autopost
  cancel-in-progress: false

# naver_drafts/ 폴더를 봇 실행 후 자동 commit/push 하기 위해 write 권한 필요
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_APP_PW: ${{ secrets.WP_APP_PW }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python autonomous_issue_bot.py

      - name: Commit Naver drafts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add naver_drafts/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new Naver drafts to commit."
          else
            git commit -m "chore: add Naver drafts [skip ci]"
            git push
          fi
